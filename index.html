<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ruby!</title>
<!-- Google Fonts for cute typography -->
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body, html {
  height: 100%;
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background-color: #fff0f3;
  cursor: pointer;
}

.birthdayimg {
  /* High-quality, aesthetic Hello Kitty pattern background covering the whole screen */
  background-image: url('https://i.pinimg.com/736x/2c/80/75/2c807530c82fb66a1e809395f190623a.jpg'); 
  background-size: repeat; /* Allows the cute pattern to seamlessly tile and cover everything */
  height: 100%;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Shading overlay to make the background sit softly behind the main card */
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 235, 240, 0.25);
  z-index: 1;
}

/* Glassmorphism container centered perfectly */
.middle {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  border: 3px solid #ffb6c1;
  padding: 50px 40px;
  border-radius: 30px;
  text-align: center;
  box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
  max-width: 90%;
  width: 500px;
  z-index: 2;
  transition: all 0.5s ease;
  animation: pulse 2s infinite alternate;
}

/* Gentle pulse effect to invite clicking */
@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2); }
  100% { transform: scale(1.03); box-shadow: 0 15px 40px rgba(255, 105, 180, 0.35); }
}

h1 {
  font-family: 'Fredoka One', cursive;
  color: #ff4a7d; /* Hello Kitty pink */
  font-size: 2.3rem;
  margin: 0;
  text-shadow: 2px 2px 0px #fff;
  line-height: 1.3;
}

.instruction {
  font-size: 1.2rem;
  color: #ff6584;
  margin-top: 15px;
  font-weight: 400;
  letter-spacing: 0.5px;
}

.topleft {
  position: absolute;
  top: 20px;
  left: 25px;
  font-weight: 600;
  color: #ff4a7d;
  background: white;
  padding: 8px 18px;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  z-index: 2;
}

.bottomleft {
  position: absolute;
  bottom: 20px;
  left: 25px;
  font-size: 0.9rem;
  color: #ff779d;
  background: rgba(255, 255, 255, 0.9);
  padding: 6px 14px;
  border-radius: 15px;
  z-index: 2;
}

/* Floating elements */
.heart {
  position: absolute;
  pointer-events: none;
  z-index: 3;
}
</style>
</head>

<body onclick="revealSurprise()">

<div class="birthdayimg">
  <div class="overlay"></div>
  
  <div class="topleft">🎀 Wish You all the Best, Nay Chi! 🎀</div>
  
  <div class="middle" id="main-card">
    <h1 id="title-text">Ruby, just tap anywhere on the screen...to find out my mwayy nay lat saung</h1>
    <div class="instruction" id="sub-text">A sweet surprise is waiting for you 🎀</div>
  </div>
  
  <div class="bottomleft">Wanna meet ya in person ^^</div>
</div>

<script>
let clicked = false;

function revealSurprise() {
  if (clicked) return;
  clicked = true;

  // Transform UI into celebration state
  const card = document.getElementById("main-card");
  card.style.animation = "none";
  card.style.transform = "scale(1.05)";
  card.style.borderColor = "#ff4a7d";
  
  document.getElementById("title-text").innerHTML = "🎉 HAPPY BIRTHDAY Rubychannn 🎉";
  document.getElementById("title-text").style.color = "#ff1493";
  document.getElementById("sub-text").innerHTML = "Opening your surprise video now... 🎁";

  // Quick initial burst of cute elements
  for(let i = 0; i < 30; i++) {
    setTimeout(createHeart, i * 40);
  }
  
  // Keep elements spawning quickly until redirect
  const burstInterval = setInterval(createHeart, 60);

  // Smoothly take her to the YouTube video after 3 seconds
  setTimeout(function() {
    clearInterval(burstInterval);
    window.location = "https://www.youtube.com/watch?v=l5LTjJ5Fs3Y";
  }, 3000);
}

// Background element floating logic
function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  // Replaced some emojis with custom Hello Kitty styled icons (Bows, Hearts, Flowers)
  heart.innerHTML = ['💝','🎀','✨','🌸', '🎈', '❤️', '🍓'][Math.floor(Math.random() * 7)];
  heart.style.left = Math.random() * 100 + "vw";
  
  const sideMovement = Math.random() * 160 - 80; 
  const duration = Math.random() * 2000 + 2500; 
  
  heart.animate([
    { transform: `translateY(105vh) translateX(0px) scale(0.5)`, opacity: 0 },
    { opacity: 0.9, offset: 0.1 },
    { opacity: 0.9, offset: 0.85 },
    { transform: `translateY(-10vh) translateX(${sideMovement}px) scale(1.6)`, opacity: 0 }
  ], {
    duration: duration,
    easing: 'ease-out'
  });

  document.body.appendChild(heart);
  
  setTimeout(() => {
    heart.remove();
  }, duration);
}

// Spawn a few gentle items before she clicks so the screen looks magically alive
setInterval(function() {
  if (!clicked) createHeart();
}, 500);
</script>

</body>
</html>
